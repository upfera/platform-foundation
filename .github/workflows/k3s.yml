name: ☸️ K3s Cluster

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Playbook to run'
        required: true
        default: 'site'
        type: choice
        options:
          - site
          - reset

jobs:
  k3s:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            ansible/requirements.yaml
          pip-install: -r requirements.txt

      - name: 🌌 Cache Ansible Collections
        uses: actions/cache@v5
        with:
          path: collections
          key: collections-${{ runner.os }}-${{ hashFiles('ansible/requirements.yaml') }}

      - name: 🔑 Setup SSH
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_OPS_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: 🔍 Register Ansible Problem Matcher
        run: echo "::add-matcher::.github/matchers/problem-matcher.json"

      - name: ⚡ Run K3s Playbook
        env:
          K3S_SERVERS: ${{ vars.K3S_SERVERS }}
          K3S_AGENTS: ${{ vars.K3S_AGENTS }}
          K3S_TOKEN: ${{ secrets.K3S_TOKEN }}
          ANSIBLE_USER: ops
          PLAYBOOK: ${{ inputs.playbook }}
        run: make k3s

      - name: 🔍 Remove Ansible Problem Matcher
        if: always()
        run: |
          echo "::remove-matcher owner=ansible-error::"
