name: 🛠️ Bootstrap host

on:
  workflow_dispatch:
    inputs:
      user:
        description: 'User to connect with (root or ops)'
        required: true
        default: 'root'
        type: choice
        options:
          - ops
          - root

jobs:
  bootstrap:
    uses: ./.github/.github/workflows/ansible.yml@main
    with:
      playbook: ansible/playbooks/bootstrap.yml
      inventory: ansible/inventories/bootstrap.yaml
      ansible_user: ${{ github.event.inputs.user }}
      pre-build-hook: |
        ansible-galaxy collection install -r ansible/requirements.yaml
    secrets:
      ssh_private_key: ${{ github.event.inputs.user == 'root' && secrets.VPS_ROOT_PRIVATE_KEY || secrets.VPS_OPS_PRIVATE_KEY }}
      ops_private_key: ${{ secrets.VPS_OPS_PRIVATE_KEY }}