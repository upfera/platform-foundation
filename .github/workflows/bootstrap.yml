name: ⚡ Manual Bootstrap

on:
  workflow_dispatch:

env:
  VPS_IP_1: ${{ vars.VPS_IP_1 }}
  VPS_IP_2: ${{ vars.VPS_IP_2 }}
  VPS_IP_3: ${{ vars.VPS_IP_3 }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: 🔑 Setup SSH Agent (Memory-Only)
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub
          chmod 644 ~/.ssh/id_rsa.pub

      - name: ⚡ Run Bootstrap
        run: make bootstrap-vps
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'