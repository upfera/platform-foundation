name: ⚡ Manual Bootstrap

on:
  workflow_dispatch:

env:
  VPS_IP_1: ${{ vars.VPS_IP_1 }}
  VPS_IP_2: ${{ vars.VPS_IP_2 }}
  VPS_IP_3: ${{ vars.VPS_IP_3 }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔑 Setup SSH Agent (Memory-Only)
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: ⚡ Run Bootstrap
        run: make bootstrap-vps
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'