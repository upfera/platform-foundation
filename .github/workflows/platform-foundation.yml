name: 🚀 Platform Foundation

on:
  workflow_dispatch:

env:
  VPS_IP_1: ${{ vars.VPS_IP_1 }}
  VPS_IP_2: ${{ vars.VPS_IP_2 }}
  VPS_IP_3: ${{ vars.VPS_IP_3 }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yaml -p ./collections

      - name: 🔑 Setup SSH Keys
        run: |
          echo "${{ secrets.VPS_OPS_PRIVATE_KEY }}" > ops_key
          chmod 600 ops_key
          echo "${{ secrets.VPS_ROOT_PRIVATE_KEY }}" > root_key
          chmod 600 root_key

      - name: ⚡ Run Platform Foundation
        run: |
          make vps
        env:
          OPS_PRIVATE_KEY_FILE: ops_key
          ROOT_PRIVATE_KEY_FILE: root_key
