name: 🚀 Platform Foundation

on:
  workflow_dispatch:
    inputs:
      ansible_user:
        description: 'Ansible connection user'
        required: true
        default: 'ops'
        type: choice
        options:
          - ops
          - root
      bootstrap:
        description: 'Whether to run bootstrap'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  VPS_IP_1: ${{ vars.VPS_IP_1 }}
  VPS_IP_2: ${{ vars.VPS_IP_2 }}
  VPS_IP_3: ${{ vars.VPS_IP_3 }}

jobs:
  platform-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yaml -p ./collections

      - name: 🔑 Setup SSH Keys
        run: |
          echo "${{ secrets.VPS_ROOT_PRIVATE_KEY }}" > root_key
          chmod 600 root_key
          echo "${{ secrets.VPS_OPS_PRIVATE_KEY }}" > ops_key
          chmod 600 ops_key

      - name: ⚡ Run Ansible playbook
        run: |
          make vps ANSIBLE_USER=${{ inputs.ansible_user }}
        env:
          ROOT_PRIVATE_KEY_FILE: root_key
          OPS_PRIVATE_KEY_FILE: ops_key
