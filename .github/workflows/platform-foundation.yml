name: 🚀 Platform Foundation

on:
  push:
    branches:
      - main

jobs:
  platform-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 🔑 Setup SSH Keys
        env:
          OPS_PUBLIC_KEY: ${{ secrets.VPS_OPS_PUBLIC_KEY }}
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_OPS_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "${{ secrets.VPS_ROOT_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          
          printf "%s" "$OPS_PUBLIC_KEY" > public_key

      - name: ⚡ Run Ansible playbook
        env:
          VPS_IP_1: ${{ vars.VPS_IP_1 }}
          VPS_IP_2: ${{ vars.VPS_IP_2 }}
          VPS_IP_3: ${{ vars.VPS_IP_3 }}
        run: |
          make vps \
            OPS_KEY="${GITHUB_WORKSPACE}/ops_private_key" \
            ROOT_KEY="${GITHUB_WORKSPACE}/root_private_key" \
            PUB_KEY="${GITHUB_WORKSPACE}/public_key"