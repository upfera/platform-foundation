name: 🐣 Provision VPS (Bootstrap)

on:
  workflow_dispatch:
    inputs:
      ssh_user:
        description: 'User to connect with (root or ops)'
        required: true
        default: 'root'
        type: choice
        options:
          - ops
          - root

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 🔑 Setup SSH
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_ROOT_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "${{ secrets.VPS_OPS_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_OPS_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub

      - name: ⚡ Run Bootstrap Playbook
        env:
          VPS_IP_1: ${{ vars.VPS_IP_1 }}
          VPS_IP_2: ${{ vars.VPS_IP_2 }}
          VPS_IP_3: ${{ vars.VPS_IP_3 }}
        run: |
          make bootstrap \
            SSH_USER=${{ github.event.inputs.ssh_user }} \
            PUB_KEY=~/.ssh/id_rsa.pub
