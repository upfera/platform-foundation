name: 🛡️ Deploy WireGuard VPN

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            ansible/requirements.yaml
          pip-install: -r requirements.txt

      - name: 🌌 Cache Ansible Collections
        uses: actions/cache@v5
        with:
          path: collections
          key: collections-${{ runner.os }}-${{ hashFiles('ansible/requirements.yaml') }}

      - name: 🔑 Setup SSH
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_OPS_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_OPS_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub

      - name: 🔍 Register Ansible Problem Matcher
        run: echo "::add-matcher::.github/matchers/problem-matcher.json"

      - name: ⚡ Run VPN Playbook
        env:
          VPN_IP: ${{ vars.VPN_IP }}
          ANSIBLE_USER: ops
          PUB_KEY_PATH: ~/.ssh/id_rsa.pub
        run: |
          make vpn

      - name: 🔍 Remove Ansible Problem Matcher
        if: always()
        run: |
          echo "::remove-matcher owner=ansible-error::"