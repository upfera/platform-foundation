name: 🚀 VPS Deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml -p ./collections

      - name: 🔍 Lint Ansible
        run: make lint

      - name: 🧪 Syntax Check
        run: make syntax-check

      - name: 🔑 Setup SSH Agent (Memory-Only)
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: 🚀 Deploy to VPS
        run: make vps
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_SSH_ARGS: "-o IdentitiesOnly=yes"
