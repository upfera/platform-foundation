# Target user for both local and VPS
target_user: ops
initial_user: "{{ target_user }}"

# SSH configuration for VPS
ssh_pub_key_path: "~/.ssh/id_rsa.pub"

# Default behavior for bootstrap
bootstrap: false

# Home directory detection
home_dir: "{{ '/home/' + target_user if ansible_connection != 'local' else lookup('env', 'HOME') }}"
