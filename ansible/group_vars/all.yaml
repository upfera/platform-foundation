# Target user for both local and VPS
target_user: ops

# SSH Key settings
ansible_user_private_key_file: "{{ lookup('env', 'ANSIBLE_USER_PRIVATE_KEY_FILE') | default('private_key', true) }}"
ansible_user_public_key_file: "{{ lookup('env', 'ANSIBLE_USER_PUBLIC_KEY_FILE') | default('public_key', true) }}"
