---
- name: 🧩 Cluster Setup
  hosts: all
  become: true
  tasks:
    - name: 📦 Install MicroK8s
      ansible.builtin.import_role:
        name: microk8s
      when: k8s_distro == 'microk8s'
      tags: [cluster, microk8s]

- name: 📦 Install k3s (from k3s-ansible collection)
  ansible.builtin.import_playbook: k3s.orchestration.site
  when: k8s_distro | default('k3s') == 'k3s'
  tags: [cluster, k3s]
