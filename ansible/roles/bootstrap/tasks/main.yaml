- name: 👤 Ensure new user exists and in sudo group
  ansible.builtin.user:
    name: "{{ initial_user }}"
    groups: sudo
    append: true
    state: present
    shell: /bin/bash
    create_home: true

- name: 🔓 Allow target user to use sudo without a password
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/{{ initial_user }}"
    create: true
    state: present
    owner: root
    group: root
    mode: '0440'
    line: "{{ initial_user }} ALL=(ALL) NOPASSWD:ALL"

- name: 📁 Create .ssh directory for new user
  ansible.builtin.file:
    path: "/home/{{ initial_user }}/.ssh"
    state: directory
    owner: "{{ initial_user }}"
    group: "{{ initial_user }}"
    mode: '0700'

- name: 🔑 Copy SSH public key to authorized_keys
  ansible.builtin.copy:
    src: "{{ ssh_pub_key_path }}"
    dest: "/home/{{ initial_user }}/.ssh/authorized_keys"
    owner: "{{ initial_user }}"
    group: "{{ initial_user }}"
    mode: '0600'

- name: 🚫 Disable password authentication for SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    backup: true

- name: ✅ Enable PubkeyAuthentication for SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
    backup: true

- name: 🔄 Restart SSH service
  ansible.builtin.service:
    name: ssh
    state: restarted

- name: 🔥 Setup UFW firewall rules
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
  loop:
    - { port: 22, label: "SSH" }
    - { port: 80, label: "HTTP" }
    - { port: 443, label: "HTTPS" }
    - { port: 16443, label: "KubeAPI" }

- name: 🧱 Enable UFW firewall
  community.general.ufw:
    state: enabled
    logging: 'on'

- name: 🧩 Allow UFW on cali+ interfaces (for Calico networking)
  community.general.ufw:
    rule: allow
    interface_in: cali+

- name: 🚀 Allow outbound traffic on cali+ interfaces
  community.general.ufw:
    rule: allow
    interface_out: cali+