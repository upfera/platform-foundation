---
- name: 📦 Install WireGuard
  ansible.builtin.package:
    name:
      - wireguard
      - wireguard-tools
      - iptables
    state: present

- name: 🌐 Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: true

- name: 🔑 Ensure WireGuard config directory exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: 🔑 Check if WireGuard private key exists
  ansible.builtin.stat:
    path: /etc/wireguard/privatekey
  register: wg_private_key_file

- name: 🔑 Generate WireGuard keys if they do not exist
  ansible.builtin.shell: |
    set -o pipefail
    wg genkey | tee /etc/wireguard/privatekey | wg pubkey > /etc/wireguard/publickey
    chmod 600 /etc/wireguard/privatekey /etc/wireguard/publickey
  args:
    executable: /bin/bash
    creates: /etc/wireguard/privatekey
  when: not wg_private_key_file.stat.exists

- name: 📖 Read WireGuard private key
  ansible.builtin.slurp:
    src: /etc/wireguard/privatekey
  register: wg_private_key

- name: 🔍 Check if WireGuard peers.conf exists
  ansible.builtin.stat:
    path: /etc/wireguard/peers.conf
  register: wg_peers_conf_file

- name: 📖 Read WireGuard peers.conf if exists
  ansible.builtin.slurp:
    src: /etc/wireguard/peers.conf
  register: wg_peers_conf
  when: wg_peers_conf_file.stat.exists

- name: ⚙️ Configure WireGuard interface
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: '0600'
  notify: 🔄 Restart WireGuard

- name: 🔥 Allow WireGuard port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ wireguard_port | string }}"
    proto: udp

- name: 🚀 Ensure WireGuard is started and enabled
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    state: started
    enabled: true
