---
- name: 🛰️ Life Stage - Infrastructure Management
  hosts: all
  become: true
  tasks:
    - name: 🔐 Security hardening
      block:
        - name: Run SSH hardening
          ansible.builtin.import_role:
            name: ssh_hardening
        - name: Run Firewall configuration
          ansible.builtin.import_role:
            name: firewall
      tags: [security]

    - name: 🧩 Cluster setup
      ansible.builtin.import_role:
        name: cluster
      tags: [cluster]