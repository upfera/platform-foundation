---
- name: 🛠️ Base System (Bootstrap)
  hosts: all
  become: true
  gather_facts: false
  pre_tasks:
    - name: 🔑 Generate SSH public key
      ansible.builtin.set_fact:
        generated_ssh_pub_key: "{{ lookup('pipe', 'ssh-keygen -y -f ' + (lookup('env', 'OPS_PRIVATE_KEY_FILE') | default('ops_key', true))) }}"
      run_once: true
      delegate_to: localhost

    - name: 🔍 Detect VPS connection
      ansible.builtin.wait_for_connection:
        timeout: 5
      register: ops_check
      ignore_errors: true
      when: ansible_connection != 'local'

    - name: ⚙️ Fallback to root
      ansible.builtin.set_fact:
        ansible_user: root
        ansible_ssh_private_key_file: "{{ lookup('env', 'ROOT_PRIVATE_KEY_FILE') | default('root_key', true) }}"
      when:
        - ansible_connection != 'local'
        - ops_check is failed

    - name: 📊 Setup
      ansible.builtin.setup:
  roles:
    - role: base
      tags: [base]
