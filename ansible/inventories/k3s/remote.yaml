# This is a sample inventory for a remote K3s cluster.
# Real values should be provided by an external infrastructure source.
server:
  hosts:
    10.0.1.10:
      ansible_host: 1.2.3.4
      k3s_node_ip: 10.0.1.10
  vars:
    api_endpoint: 10.0.1.10
    extra_server_args: >-
      --node-ip={{ k3s_node_ip }}
      --advertise-address={{ k3s_node_ip }}
      --disable traefik
      --disable servicelb

agent:
  hosts:
    10.0.1.11:
      ansible_host: 1.2.3.5
      k3s_node_ip: 10.0.1.11
  vars:
    extra_agent_args: "--node-ip={{ k3s_node_ip }}"

k3s_cluster:
  children:
    server:
    agent:
