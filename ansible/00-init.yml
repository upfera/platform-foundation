---
- name: 🏗️ Initialize Host
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: 🚀 Run Bootstrap (VPS only)
      block:
        - name: 📦 Update and upgrade system
          ansible.builtin.package:
            update_cache: true
            upgrade: dist

        - name: 📦 Install minimal required packages
          ansible.builtin.package:
            name:
              - curl
              - ca-certificates
              - unattended-upgrades
            state: present
            update_cache: true

        - name: 🌍 Set system timezone to UTC
          community.general.timezone:
            name: 'UTC'

        - name: 👤 Setup base user
          ansible.builtin.import_role:
            name: base_user

        - name: ⚙️ Enable automatic security updates
          ansible.builtin.copy:
            dest: /etc/apt/apt.conf.d/20auto-upgrades
            mode: '0644'
            owner: root
            group: root
            content: |
              APT::Periodic::Update-Package-Lists "1";
              APT::Periodic::Unattended-Upgrade "1";

        - name: 🔎 Check if reboot is required
          ansible.builtin.stat:
            path: /var/run/reboot-required
          register: reboot_required

        - name: 🔄 Reboot system if required
          ansible.builtin.reboot:
            msg: "Reboot after bootstrap provisioning"
            reboot_timeout: 600
          when: reboot_required.stat.exists
      when:
        - bootstrap | default(false) | bool
        - ansible_connection != 'local'

    - name: 🔐 Security Hardening
      block:
        - name: 🔑 SSH configuration
          ansible.builtin.import_role:
            name: ssh

        - name: 🧱 Firewall configuration
          ansible.builtin.import_role:
            name: firewall
      tags: [security]
